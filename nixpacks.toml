[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "python -c \"import nltk; nltk.download('vader_lexicon', quiet=True)\""
]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8001}"

[variables]
PYTHONPATH = "/app"
